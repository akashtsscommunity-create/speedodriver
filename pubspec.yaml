name: speedodriver
description: "A new Flutter project."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Networking
  dio: ^5.4.0
  dio_smart_retry: ^7.0.1
  web_socket_channel: ^2.4.0

  # State Management
  riverpod: ^2.5.0
  flutter_riverpod: ^2.5.0

  # Navigation
  go_router: ^14.0.0

  # Utilities
  uuid: ^4.3.0
  collection: ^1.18.0
  equatable: ^2.0.5
  intl: ^0.20.2
  logger: ^2.6.2

  # Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^10.0.0

  # JSON
  json_annotation: ^4.8.0

  # Images
  cached_network_image: ^3.3.0

  # UI
  flutter_colorpicker: ^1.0.3
  flutter_quill: ^11.5.0
  flutter_widget_from_html_core: ^0.17.0
  vsc_quill_delta_to_html: ^1.0.5

  # Localization
  easy_localization: ^3.0.8

  # Connectivity
  connectivity_plus: ^7.0.0

  # File Handling
  file_picker: ^8.0.7
  open_filex: ^4.7.0

  # URL Launcher
  url_launcher: ^6.3.0

  # Environment Variables
  flutter_dotenv: ^5.1.0

  # Real-time Communication
  signalr_core: 1.1.2

  # Maps & Location
  flutter_map: ^8.1.1
  latlong2: ^0.9.1
  geolocator: ^14.0.2

  # Backend
  supabase_flutter: ^2.6.0

  http: ^1.2.1
  path: ^1.9.0
  image_picker: ^1.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

dependency_overrides:
  web: ^1.1.0

flutter:
  uses-material-design: true

  assets:
    - assets/i18n/
    - assets/images/

